apiVersion: v1
kind: ConfigMap
metadata:
  name: leads-microservice-config
  namespace: statex-apps
  labels:
    app: leads-microservice
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "leads-microservice"
  DOMAIN: "leads.alfares.cz"
  PORT: "4400"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "192.168.88.53"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "leads"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  # TIMEOUT_MS: "30000"
