apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: leads-microservice-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: leads-microservice-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/prod/leads-microservice
        property: DATABASE_URL
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/leads-microservice
        property: DB_PASSWORD
    - secretKey: PAYMENT_API_KEY
      remoteRef:
        key: secret/prod/leads-microservice
        property: PAYMENT_API_KEY
    - secretKey: PAYMENT_APPLICATION_ID
      remoteRef:
        key: secret/prod/leads-microservice
        property: PAYMENT_APPLICATION_ID
    - secretKey: PAYMENT_WEBHOOK_API_KEY
      remoteRef:
        key: secret/prod/leads-microservice
        property: PAYMENT_WEBHOOK_API_KEY
    - secretKey: INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/leads-microservice
        property: INTERNAL_SERVICE_TOKEN
    - secretKey: TRUSTED_INTERNAL_SERVICES
      remoteRef:
        key: secret/prod/leads-microservice
        property: TRUSTED_INTERNAL_SERVICES
    - secretKey: NOTIFICATIONS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/leads-microservice
        property: NOTIFICATIONS_SERVICE_TOKEN

    - secretKey: JWT_TOKEN
      remoteRef:
        key: secret/prod/leads-microservice
        property: JWT_TOKEN
    - secretKey: LEADS_ADMIN_WORKSPACE_SOURCE_MAP
      remoteRef:
        key: secret/prod/leads-microservice
        property: LEADS_ADMIN_WORKSPACE_SOURCE_MAP
    - secretKey: LEADS_ORDERS_EVENTS_RABBITMQ_URL
      remoteRef:
        key: secret/prod/leads-microservice
        property: LEADS_ORDERS_EVENTS_RABBITMQ_URL
